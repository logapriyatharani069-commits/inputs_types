
      <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Inputs Master Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <style>
    body {
      background: #eef2f7;
    }
    h2 {
      margin-top: 40px;
      text-align: center;
      font-weight: bold;
    }
    .card {
      margin-top: 20px;
      border-radius: 15px;
      padding: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1 class="text-center mt-4">🔥 Bootstrap Input Types Project</h1>

  <!-- 🔹 BASIC INPUTS -->
  <h2>1. Basic Inputs</h2>
  <div class="card">
    <input type="text" class="form-control mb-2" placeholder="Text input">
    <input type="email" class="form-control mb-2" placeholder="Email">
    <input type="password" class="form-control mb-2" placeholder="Password">
    <input type="number" class="form-control mb-2" placeholder="Number">
    <input type="date" class="form-control mb-2">
    <input type="color" class="form-control mb-2">
  </div>

  <!-- 🔹 TEXTAREA -->
  <h2>2. Textarea</h2>
  <div class="card">
    <textarea class="form-control" rows="4" placeholder="Enter message"></textarea>
  </div>

  <!-- 🔹 CHECKBOX -->
  <h2>3. Checkbox</h2>
  <div class="card">
    <div class="form-check">
      <input type="checkbox" class="form-check-input">
      <label class="form-check-label">Option 1</label>
    </div>
    <div class="form-check">
      <input type="checkbox" class="form-check-input">
      <label class="form-check-label">Option 2</label>
    </div>
  </div>

  <!-- 🔹 INLINE CHECKBOX -->
  <h2>4. Inline Checkbox</h2>
  <div class="card">
    <div class="form-check-inline">
      <input type="checkbox" class="form-check-input"> Option 1
    </div>
    <div class="form-check-inline">
      <input type="checkbox" class="form-check-input"> Option 2
    </div>
  </div>

  <!-- 🔹 RADIO -->
  <h2>5. Radio Buttons</h2>
  <div class="card">
    <div class="form-check">
      <input type="radio" name="gender" class="form-check-input"> Male
    </div>
    <div class="form-check">
      <input type="radio" name="gender" class="form-check-input"> Female
    </div>
  </div>

  <!-- 🔹 INLINE RADIO -->
  <h2>6. Inline Radio</h2>
  <div class="card">
    <div class="form-check-inline">
      <input type="radio" name="r" class="form-check-input"> Yes
    </div>
    <div class="form-check-inline">
      <input type="radio" name="r" class="form-check-input"> No
    </div>
  </div>

  <!-- 🔹 SELECT -->
  <h2>7. Select Dropdown</h2>
  <div class="card">
    <select class="form-control">
      <option>Select Course</option>
      <option>HTML</option>
      <option>CSS</option>
      <option>Bootstrap</option>
    </select>
  </div>

  <!-- 🔹 INPUT SIZES -->
  <h2>8. Input Sizes</h2>
  <div class="card">
    <input class="form-control form-control-lg mb-2" placeholder="Large input">
    <input class="form-control mb-2" placeholder="Default input">
    <input class="form-control form-control-sm" placeholder="Small input">
  </div>

  <!-- 🔹 PLAIN TEXT -->
  <h2>9. Plain Text</h2>
  <div class="card">
    <input type="text" class="form-control-plaintext" value="Plain text input">
  </div>

  <!-- 🔹 FILE INPUT -->
  <h2>10. File Upload</h2>
  <div class="card">
    <input type="file" class="form-control-file">
  </div>

  <!-- 🔹 RANGE -->
  <h2>11. Range Slider</h2>
  <div class="card">
    <input type="range" class="form-control-range">
  </div>

</div>

</body>
</html>
